[build]
builder = "nixpacks"

[build.env]
NIXPACKS_NODE_VERSION = "20"
NIXPACKS_NO_CACHE = "1"
NODE_ENV = "production"

[deploy]
startCommand = "next start -p ${PORT:-3000}"
healthcheckPath = "/api/health"
healthcheckTimeout = 300
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3

[service]
internalPort = 8080
